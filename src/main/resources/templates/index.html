<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java TODO Demo</title>
    <link rel="icon" href="data:," />
</head>
<body>
    <h1>Java TODO Demo</h1>

    <form method="post" action="/todos" autocomplete="off">
        <input type="text" name="title" placeholder="What needs doing?"
             aria-label="New todo title" data-testid="new-todo-input" required />
        <button type="submit" data-testid="add-todo">Add</button>
    </form>

    <ul>
        <li th:each="todo : ${todos}" data-testid="todo-item">
            <form method="post" th:action="@{/todos/{id}/toggle(id=${todo.id})}">
                <input type="checkbox" th:checked="${todo.completed}"
                       th:attr="aria-label='Toggle ' + ${todo.title}"
                       onchange="this.form.submit()" />
                <span th:text="${todo.title}">Todo title</span>
                <button type="submit" th:formaction="@{/todos/{id}/delete(id=${todo.id})}"
                        data-testid="delete-todo">Delete</button>
            </form>
        </li>
    </ul>
</body>
</html>
