<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java TODO Demo</title>
    <link rel="icon" href="data:," />
</head>
<body>
    <h1>Java TODO Demo</h1>

    <form id="todo-form" autocomplete="off">
        <input id="new-todo" type="text" placeholder="What needs doing?"
               aria-label="New todo title" data-testid="new-todo-input" />
        <button type="submit" data-testid="add-todo">Add</button>
    </form>

    <ul id="todo-list"></ul>

<script>
    const API = "/api/todos";
    const list = document.getElementById("todo-list");
    const form = document.getElementById("todo-form");
    const input = document.getElementById("new-todo");

    async function loadTodos() {
        const res = await fetch(API);
        if (!res.ok) {
            console.error("Failed to load todos", res.status);
            return;
        }
        const todos = await res.json();
        render(todos);
    }

    function render(todos) {
        list.innerHTML = "";
        for (const todo of todos) {
            const li = document.createElement("li");
            li.dataset.testid = "todo-item";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = todo.completed;
            checkbox.setAttribute("aria-label", "Toggle " + todo.title);
            checkbox.addEventListener("change", () => toggleTodo(todo, checkbox.checked));

            const title = document.createElement("span");
            title.textContent = todo.title;

            const del = document.createElement("button");
            del.type = "button";
            del.textContent = "Delete";
            del.dataset.testid = "delete-todo";
            del.addEventListener("click", () => deleteTodo(todo.id));

            li.append(checkbox, title, del);
            list.appendChild(li);
        }
    }

    async function addTodo(title) {
        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title })
        });
        if (res.ok) {
            await loadTodos();
        } else {
            console.error("Failed to add todo", res.status);
        }
    }

    async function toggleTodo(todo, completed) {
        const res = await fetch(`${API}/${todo.id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: todo.title, completed })
        });
        if (res.ok) {
            await loadTodos();
        }
    }

    async function deleteTodo(id) {
        const res = await fetch(`${API}/${id}`, { method: "DELETE" });
        if (res.ok) {
            await loadTodos();
        }
    }

    form.addEventListener("submit", (e) => {
        e.preventDefault();
        const title = input.value.trim();
        if (!title) return;
        input.value = "";
        addTodo(title);
    });

    loadTodos();
</script>
</body>
</html>
