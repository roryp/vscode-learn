spring.application.name=springboot-mcp-demo

# ---------------------------------------------------------------------------
# MCP server (Spring AI)
# ---------------------------------------------------------------------------
# IMPORTANT: the spring-ai-starter-mcp-server-webmvc starter serves the (now
# deprecated) SSE transport unless you explicitly opt into Streamable-HTTP.
# Setting STREAMABLE publishes the modern endpoint at http://localhost:8080/mcp,
# which is what the VS Code MCP client (.vscode/mcp.json, "type": "http") uses.
# Annotation scanning is on by default, so every @McpTool bean is auto-registered.
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=todo-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.instructions=Tools to list, create, complete, set due dates, and delete todo items.

# ---------------------------------------------------------------------------
# Datasource — H2 file-based so todos survive restarts
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/tododb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# H2 Console (optional, useful during development)
# ---------------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
# Actuator (health/info for the demo)
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
